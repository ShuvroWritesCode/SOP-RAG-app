version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: sop_rag_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai-admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./ai-bots-admin-main
      dockerfile: Dockerfile
    container_name: sop_rag_backend
    restart: unless-stopped
    env_file:
      - ./ai-bots-admin-main/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
      - backend_conversations:/app/conversations
      - backend_conversations_meta:/app/conversations-metadata

  frontend:
    build:
      context: ./MackFAQ-front-main
      dockerfile: Dockerfile
    container_name: sop_rag_frontend
    restart: unless-stopped
    env_file:
      - ./MackFAQ-front-main/.env
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_storage:
  backend_conversations:
  backend_conversations_meta:
